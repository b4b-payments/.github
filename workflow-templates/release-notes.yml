# Release Notes & Change Management Workflow
#
# This is a thin stub. All logic lives in the reusable workflow in the
# b4b-payments/release-notes repo, so updates there propagate to every
# repo automatically — this file should rarely (if ever) need changing.
#
name: Release Notes

on:
  issue_comment:
    types: [created]
  pull_request:
    types: [closed]

permissions:
  contents: read
  pull-requests: write
  statuses: write

jobs:
  release-notes:
    uses: b4b-payments/release-notes/.github/workflows/release-notes-reusable.yml@main
    secrets: inherit
